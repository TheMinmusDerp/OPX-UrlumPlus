RESEARCHBODIES:NEEDS[ResearchBodies]
{
	loadAs = mod
	name = OPX-UrlumPlus
	ONDISCOVERY
	{
		Urlum = #LOC_OPX-UP_RB_Urlum
		Hock = #LOC_OPX-UP_RB_Hock
		Picna = #LOC_OPX-UP_RB_Picna
		Polta = #LOC_OPX-UP_RB_Polta
		Priax = #LOC_OPX-UP_RB_Priax
		Dathil = #LOC_OPX-UP_RB_Dathil
		Biscotti = #LOC_OPX-UP_RB_Biscotti
		Wal = #LOC_OPX-UP_RB_Wal
		Tal = #LOC_OPX-UP_RB_Tal
  		Lyxis = #LOC_OPX-UP_RB_Lyxis
		Halas = #LOC_OPX-UP_RB_Halas
	}
 	IGNORELEVELS
  	{
   		Wal = true true false false
		Wal = true false false false
	}
}

RESEARCHBODIES:NEEDS[ResearchBodies,@OPX_UrlumPlus_Settings:HAS[#UseInnerPseudobodies[True]]]
{
	loadAs = mod
	name = OPX-UrlumPlus-InnerPseudobodies
	ONDISCOVERY
	{
		I1-Adar = #LOC_OPX-UP_RB_InnerPseudobodies
		I2-Odar = #LOC_OPX-UP_RB_InnerPseudobodies
		I3-Kassa = #LOC_OPX-UP_RB_InnerPseudobodies
		I4-Rani = #LOC_OPX-UP_RB_InnerPseudobodies
		I5-Lisboa = #LOC_OPX-UP_RB_InnerPseudobodies
		I6-Bam = #LOC_OPX-UP_RB_Bam
	}
}

RESEARCHBODIES:NEEDS[ResearchBodies,@OPX_UrlumPlus_Settings:HAS[#UseWalPseudobodies[True]]]
