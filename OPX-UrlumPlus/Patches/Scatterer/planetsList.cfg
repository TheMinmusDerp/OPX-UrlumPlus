@Scatterer_planetsList:BEFORE[OPX-SarnusPlus]
{
    @scattererCelestialBodies
    {
        !Item:HAS[#celestialBodyName[Urlum]]
        Item
		{
			celestialBodyName = Urlum
			transformName = Urlum
			loadDistance = 5E+08
			unloadDistance = 1E+09
			hasOcean = False
			flatScaledSpaceModel = True
			usesCloudIntegration = True
			cloudIntegrationUsesScattererSunColors = False
			mainSunCelestialBody = Sun
			sunsUseIntensityCurves = False
			eclipseCasters
			{
				Item = Hock
                Item = Picna
                Item = Polta
				Item = Priax
                Item = Dathil
                Item = Biscotti
				Item = Wal
				Item = Tal
                Item = Lyxis
			}
		}
    }
}