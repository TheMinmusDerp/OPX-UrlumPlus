@Kopernicus:BEFORE[OPX-UrlumPlus]
{
    OPX_UrlumPlus_Settings
    {
        WalRevamp = True
        TalRevamp = True
        PoltaRevamp = True
        PriaxRevamp = True
        UrlumTextureChange = True
        UseInnerPseudobodies = True 
        UseWalPseudobodies = True
        UseOuterPseudobodies = True
        RealisticMoonSizes = True
        MinorPlanetNumbers = True
    }
}
//EXPLANATIONS
//Revamps – remastered textures for Polta, Priax, Wal, and Tal respectively. Can be disabled individually, True by default
//UrlumTextureChange – The replacement Urlum texture. True by default, but added a toggle on the request of @rexxars on discord for nostalgia purposes? I guess? 
//UrlumTextureChange does not affect the ring texture, and does not work without OPM installed.
//UseInnerPseudobodies – adds the many inner pseudobodies to the system, as optional destinations within the ring system.
//UseWalPseudobodies – adds the two pseudobodies to the inner system of the major moon Wal, to give Tal some company.
//UseOuterPseudobodies – adds captured asteroids to the outer Urlum system as optional destinations.
//RealisticMoonSizes – does nothing when Polta and Priax revamps are enabled, but when they are disabled you can pick whether they get the more realistic size I calculated or their inflated original OPM scale. 
//MinorPlanetNumbers – changes the frontend name of Halas to add a KAU minor planet number to the front of it if you want
